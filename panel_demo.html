<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guardian — Panel (preview)</title>
<style>
  :root{--ink:#191917;--soft:#54534e;--faint:#8b8a83;--line:#eceae4;--line2:#e3e1da;
    --paper:#fff;--paper2:#faf9f6;--paper3:#f5f4ef;--sage:#4f6f57;--sage-bg:#eef3ee;
    --serif:ui-serif,Georgia,serif;--sans:ui-sans-serif,system-ui,sans-serif;}
  body.dark{--ink:#f3f2ee;--soft:#b6b4ad;--faint:#7c7b74;--line:#262623;--line2:#34332f;
    --paper:#151513;--paper2:#0d0d0c;--paper3:#1e1e1b;--sage:#f0efe9;--sage-bg:#242421;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--sans);background:var(--paper2);color:var(--ink);
    font-size:14.5px;transition:background .2s,color .2s;}
  .demo-tag{background:#1d2b20;color:#dfeede;font-size:12px;text-align:center;padding:6px;font-family:var(--sans);}
  body.dark .demo-tag{background:#242421;color:#cdccc5;}
  .top{display:flex;align-items:center;justify-content:space-between;padding:14px 26px;
    background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;}
  .brand{display:flex;align-items:center;gap:11px;}
  .menu-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--line2);
    background:var(--paper3);overflow:hidden;cursor:pointer;padding:0;display:flex;
    align-items:center;justify-content:center;font-family:var(--serif);font-size:19px;font-weight:600;color:var(--soft);}
  .menu-btn img{width:100%;height:100%;object-fit:cover;display:block;}
  .brand b{font-family:var(--serif);font-size:18px;font-weight:600;}
  .menu{position:absolute;top:62px;left:26px;background:var(--paper);border:1px solid var(--line2);
    border-radius:12px;padding:8px;min-width:210px;display:none;z-index:30;box-shadow:0 8px 28px rgba(0,0,0,.10);}
  .menu.open{display:block;}
  .menu .uhead{display:flex;align-items:center;gap:10px;padding:8px 10px 12px;border-bottom:1px solid var(--line);margin-bottom:6px;}
  .menu .uhead .ph{width:34px;height:34px;border-radius:50%;background:var(--paper3);
    display:flex;align-items:center;justify-content:center;font-weight:500;color:var(--soft);}
  .menu .uhead small{display:block;color:var(--faint);font-size:12px;}
  .menu button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;
    background:none;border:0;color:var(--ink);font:inherit;padding:9px 10px;border-radius:8px;cursor:pointer;}
  .menu button:hover{background:var(--paper3);}
  .wrap{display:grid;grid-template-columns:248px 1fr;min-height:calc(100vh - 103px);}
  .servers{border-right:1px solid var(--line);padding:20px 16px;background:var(--paper);}
  .servers .lab{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--faint);margin:0 0 12px 8px;}
  .srv{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:9px;cursor:pointer;
    border:1px solid transparent;margin-bottom:2px;}
  .srv:hover{background:var(--paper3);}
  .srv.active{background:var(--paper3);border-color:var(--line2);}
  .srv .ic{width:30px;height:30px;border-radius:8px;background:var(--paper3);
    border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--soft);font-size:13px;}
  .srv .nm{font-size:13.5px;}
  main{padding:28px 32px 60px;max-width:920px;}
  .phh{font-family:var(--serif);font-size:22px;font-weight:600;margin:0 0 3px;}
  .sub{color:var(--faint);font-size:13px;margin:0 0 24px;}
  .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:26px;}
  .metric{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px 18px;}
  .metric .k{font-size:12px;color:var(--faint);margin-bottom:10px;}
  .metric .v{font-family:var(--serif);font-size:27px;font-weight:600;}
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:20px 21px;margin-bottom:18px;}
  .panel h3{font-family:var(--serif);font-size:16px;font-weight:600;margin:0 0 14px;}
  .mods{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .modrow{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;}
  .modrow .nm{font-size:13.5px;}
  .modrow .nm span{color:var(--faint);font-size:12px;}
  .modrow .st{margin-left:auto;font-size:11.5px;padding:3px 9px;border-radius:999px;}
  .on{background:var(--sage-bg);color:var(--sage);} .off{background:var(--paper3);color:var(--faint);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--faint);font-weight:500;font-size:11.5px;text-transform:uppercase;
    letter-spacing:.05em;padding:0 0 10px;border-bottom:1px solid var(--line);}
  td{padding:11px 0;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:0;}
  .tag{font-size:11px;padding:3px 8px;border-radius:999px;font-weight:500;background:var(--paper3);color:var(--soft);}
  .muted{color:var(--faint);}
</style>
</head>
<body>
<div class="demo-tag">Preview with sample data — the real panel runs with “python webpanel.py” and logs in via Discord.</div>
<div class="top">
  <div class="brand">
    <button class="menu-btn" id="menuBtn" aria-label="Menu">
      <img src="static/bot.png" alt="" onerror="this.parentNode.textContent='G'">
    </button>
    <b>Guardian</b>
  </div>
</div>
<div class="menu" id="menu">
  <div class="uhead"><div class="ph">K</div><div><div>Kan</div><small>Signed in</small></div></div>
  <button onclick="toggleTheme()"><span id="themeTxt">Dark mode</span></button>
  <button onclick="alert('Demo only')">Log out</button>
</div>

<div class="wrap">
  <div class="servers">
    <p class="lab">Your servers</p>
    <div id="srvlist"></div>
  </div>
  <main id="main"></main>
</div>

<script>
  const menuBtn=document.getElementById('menuBtn'),menu=document.getElementById('menu');
  menuBtn.addEventListener('click',e=>{e.stopPropagation();menu.classList.toggle('open');});
  document.addEventListener('click',e=>{if(!menu.contains(e.target))menu.classList.remove('open');});
  function toggleTheme(){document.body.classList.toggle('dark');
    document.getElementById('themeTxt').textContent=document.body.classList.contains('dark')?'Light mode':'Dark mode';}

  const DATA={
    "La Communauté":{init:"LC",sanctions:9,quar:3,raid:[8,10],
      mods:[["Anti-raid",1,"8 joins / 10s"],["Anti-nuke",1,"20s window"],["Anti-spam",1,"6 msg / 5s"],["New accounts",1,"min 7 days"]],
      rows:[["14:02","spammer_44","timeout","Anti-spam","flood"],["13:47","raid_0091","kick","Anti-spam","@everyone"],["11:20","nuker_alt","quarantine","Anti-nuke","channel deletion"]],
      q:[["kit_7782","account too new"],["Moderateur_","impersonation 94%"],["botnet_x99","join wave"]]},
    "Gaming Hub":{init:"GH",sanctions:2,quar:0,raid:[12,15],
      mods:[["Anti-raid",1,"12 joins / 15s"],["Anti-nuke",1,"20s window"],["Anti-spam",0,"off"],["New accounts",1,"min 3 days"]],
      rows:[["08:12","ad_bot_x","ban","Anti-spam","invite link"]],q:[]},
    "Study Lounge":{init:"SL",sanctions:0,quar:0,raid:[6,10],
      mods:[["Anti-raid",1,"6 joins / 10s"],["Anti-nuke",1,"20s window"],["Anti-spam",1,"5 msg / 5s"],["New accounts",1,"min 14 days"]],
      rows:[],q:[]}
  };
  const sl=document.getElementById('srvlist');
  sl.innerHTML=Object.keys(DATA).map((n,i)=>`<div class="srv ${i===0?'active':''}" onclick="sel(this,'${n}')"><div class="ic">${DATA[n].init}</div><div class="nm">${n}</div></div>`).join('');
  function sel(el,name){
    document.querySelectorAll('.srv').forEach(s=>s.classList.remove('active'));
    el.classList.add('active');
    const d=DATA[name];
    const mod=(label,on,sub)=>`<div class="modrow"><div class="nm">${label}<br><span>${sub}</span></div><span class="st ${on?'on':'off'}">${on?'on':'off'}</span></div>`;
    const rows=d.rows.map(r=>`<tr><td class="muted">${r[0]}</td><td>${r[1]}</td><td><span class="tag">${r[2]}</span></td><td class="muted">${r[3]}</td><td>${r[4]}</td></tr>`).join('')||'<tr><td colspan="5" class="muted" style="padding:16px 0">No sanctions yet.</td></tr>';
    const q=d.q.map(x=>`<tr><td>${x[0]}</td><td class="muted">${x[1]}</td></tr>`).join('')||'<tr><td colspan="2" class="muted" style="padding:16px 0">Nobody in quarantine.</td></tr>';
    document.getElementById('main').innerHTML=`
      <p class="phh">${name}</p><p class="sub">Live protection status, read from the bot.</p>
      <div class="metrics">
        <div class="metric"><div class="k">Sanctions logged</div><div class="v">${d.sanctions}</div></div>
        <div class="metric"><div class="k">In quarantine</div><div class="v">${d.quar}</div></div>
        <div class="metric"><div class="k">Raid threshold</div><div class="v">${d.raid[0]}<span style="font-size:14px">/${d.raid[1]}s</span></div></div>
      </div>
      <div class="panel"><h3>Protections</h3><div class="mods">${d.mods.map(m=>mod(m[0],m[1],m[2])).join('')}</div></div>
      <div class="panel"><h3>Recent sanctions</h3><table><thead><tr><th>Time</th><th>Member</th><th>Action</th><th>Module</th><th>Reason</th></tr></thead><tbody>${rows}</tbody></table></div>
      <div class="panel"><h3>Quarantine</h3><table><thead><tr><th>Member</th><th>Reason</th></tr></thead><tbody>${q}</tbody></table></div>`;
  }
  sel(document.querySelector('.srv'),Object.keys(DATA)[0]);
</script>
</body>
</html>

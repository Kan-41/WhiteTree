<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terms of Service — WhiteTree</title>
<style>
  :root { --ink:#1a1a1a; --muted:#6b6b6b; --line:#ececec; --paper:#fff; --body:#2a2a2a; }
  body.dark { --ink:#f3f2ee; --muted:#9b9a93; --line:#2a2a27; --paper:#0d0d0c; --body:#cdccc5; }
  * { box-sizing: border-box; }
  body { font-family: ui-serif, Georgia, "Times New Roman", serif; color: var(--ink);
    background: var(--paper); margin: 0; line-height: 1.7; -webkit-font-smoothing: antialiased;
    transition: background .2s, color .2s; }
  .controls { position: fixed; top: 18px; right: 18px; z-index: 10; display: flex; gap: 8px; }
  .controls select, .controls button {
    font-family: ui-sans-serif, system-ui, sans-serif; font-size: 13px; color: var(--muted);
    background: var(--paper); border: 1px solid var(--line); padding: 7px 12px;
    border-radius: 999px; cursor: pointer; }
  .controls button:hover, .controls select:hover { color: var(--ink); }
  [dir=rtl] .controls { right: auto; left: 18px; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 72px 28px 96px; }
  .eyebrow { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px;
    letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  h1 { font-size: 34px; font-weight: 600; letter-spacing: -.01em; margin: 0 0 6px; }
  .updated { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 13px;
    color: var(--muted); margin-bottom: 44px; }
  h2 { font-size: 19px; font-weight: 600; margin: 40px 0 10px; }
  p, li { font-size: 16.5px; color: var(--body); }
  ul { padding-left: 22px; } li { margin: 6px 0; }
  a { color: var(--ink); text-decoration: underline; text-underline-offset: 2px; }
  .rule { height: 1px; background: var(--line); border: 0; margin: 48px 0 0; }
  footer { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 13px;
    color: var(--muted); margin-top: 40px; }
</style>
</head>
<body>
<div class="controls">
  <select class="langsel" aria-label="Language"></select>
  <button id="themebtn"></button>
</div>
<div class="wrap">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:30px;">
    <span style="width:40px;height:40px;border-radius:50%;overflow:hidden;border:1px solid var(--line);background:var(--card);display:flex;align-items:center;justify-content:center;font-family:ui-serif,Georgia,serif;font-weight:600;color:var(--muted);">
      <img src="bot.png" alt="WhiteTree" style="width:100%;height:100%;object-fit:cover;" onerror="this.replaceWith(document.createTextNode('W'))"></span>
    <b style="font-family:ui-serif,Georgia,serif;font-size:18px;">WhiteTree</b>
  </div>
  <div class="eyebrow" data-i18n="tm.eye"></div>
  <h1 data-i18n="tm.h"></h1>
  <div class="updated" data-i18n="tm.upd"></div>

  <p data-i18n="tm.intro"></p>

  <h2 data-i18n="tm.h1"></h2>
  <p data-i18n="tm.b1"></p>

  <h2 data-i18n="tm.h2"></h2>
  <ul>
    <li data-i18n="tm.b2a"></li>
    <li data-i18n="tm.b2b"></li>
    <li data-i18n="tm.b2c"></li>
  </ul>

  <h2 data-i18n="tm.h3"></h2>
  <p data-i18n="tm.b3"></p>

  <h2 data-i18n="tm.h4"></h2>
  <p data-i18n="tm.b4"></p>

  <h2 data-i18n="tm.h5"></h2>
  <p data-i18n="tm.b5"></p>

  <h2 data-i18n="tm.h6"></h2>
  <p data-i18n="tm.b6"></p>

  <h2 data-i18n="tm.h7"></h2>
  <p data-i18n="tm.b7"></p>

  <h2 data-i18n="pv.h6"></h2>
  <p data-i18n="tm.ct1"></p>
  <p data-i18n-html="tm.ct2"></p>

  <hr class="rule">
  <footer data-i18n="tm.foot"></footer>
</div>
<script src="i18n.js"></script>
<script>
  const tb = document.getElementById("themebtn");
  function themeLabel(){ tb.textContent = document.body.classList.contains("dark") ? t("t.light") : t("t.dark"); }
  tb.addEventListener("click", ()=>{ document.body.classList.toggle("dark"); themeLabel(); });
  document.addEventListener("langchange", themeLabel);
  themeLabel();
</script>
</body>
</html>

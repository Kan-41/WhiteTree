<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhiteTree — Sign in</title>
<style>
  :root{--ink:#191917;--faint:#8b8a83;--line:#e3e1da;--paper:#faf9f6;--card:#fff;
    --serif:ui-serif,Georgia,serif;--sans:ui-sans-serif,system-ui,sans-serif;}
  body.dark{--ink:#f3f2ee;--faint:#7c7b74;--line:#34332f;--paper:#0d0d0c;--card:#151513;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--sans);background:var(--paper);color:var(--ink);
    min-height:100vh;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;
    padding:48px 40px;width:370px;text-align:center;}
  .logo{width:92px;height:92px;border-radius:50%;object-fit:cover;border:1px solid var(--line);
    margin:0 auto 22px;display:flex;align-items:center;justify-content:center;background:var(--paper);
    font-family:var(--serif);font-size:38px;font-weight:600;color:var(--faint);overflow:hidden;}
  .logo img{width:100%;height:100%;object-fit:cover;}
  h1{font-family:var(--serif);font-size:27px;font-weight:600;margin:0 0 6px;letter-spacing:-.01em;}
  p{color:var(--faint);font-size:14px;margin:0 0 30px;line-height:1.6;}
  .btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
    background:#5865F2;color:#fff;border:0;border-radius:12px;padding:14px;
    font-size:15px;font-weight:500;cursor:pointer;text-decoration:none;}
  .btn:hover{filter:brightness(1.05);}
  .btn svg{width:21px;height:21px;fill:currentColor;}
  .theme{position:fixed;top:18px;right:18px;font-size:13px;color:var(--faint);
    background:var(--card);border:1px solid var(--line);padding:7px 12px;border-radius:999px;cursor:pointer;}
  .foot{margin-top:24px;font-size:12px;color:var(--faint);}
  .foot a{color:var(--faint);}
</style>
</head>
<body>
<button class="theme" onclick="document.body.classList.toggle('dark');this.textContent=document.body.classList.contains('dark')?'Light':'Dark';">Dark</button>
<div class="card">
  <div class="logo"><img src="bot.png" alt="WhiteTree" onerror="this.replaceWith(document.createTextNode('W'))"></div>
  <h1>WhiteTree</h1>
  <p>Sign in with Discord to manage protection on the servers where WhiteTree is installed.</p>
  <a class="btn" id="loginBtn" href="https://YOUR-PANEL-DOMAIN/login">
    <svg viewBox="0 0 24 24"><path d="M20 4.4A19 19 0 0 0 15.3 3l-.2.5a14 14 0 0 1 4.2 1.3 12.7 12.7 0 0 0-15 0A14 14 0 0 1 8.6 3.5L8.4 3A19 19 0 0 0 3.7 4.4 19.7 19.7 0 0 0 .5 17.6 14 14 0 0 0 6.7 21l.9-1.3a9 9 0 0 1-2-1l.5-.4a9.4 9.4 0 0 0 9.6 0l.5.4a9 9 0 0 1-2 1L15 21a14 14 0 0 0 6.2-3.4 19.7 19.7 0 0 0-3.2-13.2zM8.6 14.9c-.9 0-1.7-.9-1.7-2s.7-2 1.7-2 1.7.9 1.7 2-.8 2-1.7 2zm6.8 0c-.9 0-1.7-.9-1.7-2s.7-2 1.7-2 1.7.9 1.7 2-.8 2-1.7 2z"/></svg>
    Login with Discord
  </a>
  <div class="foot"><a href="terms.html">Terms</a> · <a href="privacy.html">Privacy</a></div>
</div>
</body>
</html>
